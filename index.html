<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Sentier des Mots — Le parcours de français de Louise</title>
<meta name="description" content="Parcours de français progressif : classes grammaticales, expansions du nom, temps simples et composés, valeurs des temps du passé.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg: #FAF6F0;
  --bg-alt: #F2ECDF;
  --ink: #2B2E4A;
  --ink-soft: #5B5E7A;
  --ink-faint: #8B8FA8;
  --accent: #E8734A;
  --accent-dark: #C85A34;
  --accent-soft: #F6C6AE;
  --success: #6B8F71;
  --success-soft: #DCE8DD;
  --gold: #D4A24C;
  --gold-soft: #F5E3BE;
  --error-soft: #C97B6E;
  --error-bg: #F7E2DC;
  --card-bg: #FFFFFF;
  --path-line: #D8CFC0;
  --line: #E4DCCB;
  --shadow: 0 2px 14px rgba(43,46,74,0.08);
  --shadow-lift: 0 8px 24px rgba(43,46,74,0.14);
  --radius: 18px;
  --radius-sm: 10px;
  --font-display: 'Baloo 2', 'Comic Sans MS', sans-serif;
  --font-body: 'Atkinson Hyperlegible', 'Segoe UI', Arial, sans-serif;
  color-scheme: light;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:17px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4,.font-display{font-family:var(--font-display); font-weight:700; letter-spacing:0.2px;}
button{font-family:var(--font-body);}
a{color:var(--accent-dark);}
:focus-visible{outline:3px solid var(--accent); outline-offset:2px; border-radius:6px;}
.visually-hidden{position:absolute; width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* ============ LAYOUT SHELL ============ */
#app{max-width:920px; margin:0 auto; padding:0 18px 90px; min-height:100vh;}
header.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 0 10px; position:sticky; top:0; background:var(--bg);
  z-index:20; border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:10px;}
.brand .disc{
  width:34px; height:34px; border-radius:50%;
  background: radial-gradient(circle at 30% 30%, var(--gold-soft), var(--accent) 70%);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5);
  flex-shrink:0;
}
.brand h1{font-size:1.25rem; margin:0; color:var(--ink);}
.topbar-stats{display:flex; gap:14px; align-items:center; font-size:0.92rem; color:var(--ink-soft);}
.topbar-stats .pill{
  background:var(--card-bg); border:1px solid var(--line); border-radius:20px;
  padding:5px 12px; display:flex; align-items:center; gap:6px; font-weight:600;
}
nav.tabs{display:flex; gap:8px; margin:14px 0 22px; flex-wrap:wrap;}
nav.tabs button{
  border:1px solid var(--line); background:var(--card-bg); color:var(--ink-soft);
  padding:9px 16px; border-radius:999px; cursor:pointer; font-size:0.95rem; font-weight:600;
  transition:transform .12s ease, background .12s ease, color .12s ease;
}
nav.tabs button:hover{transform:translateY(-1px);}
nav.tabs button[aria-selected="true"]{background:var(--ink); color:#fff; border-color:var(--ink);}

.screen{display:none;}
.screen.active{display:block; animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

/* ============ CARDS / GENERIC ============ */
.card{
  background:var(--card-bg); border-radius:var(--radius); padding:20px;
  box-shadow:var(--shadow); border:1px solid var(--line); margin-bottom:16px;
}
.card h3{margin:0 0 8px;}
.muted{color:var(--ink-soft);}
.small{font-size:0.87rem;}
.btn{
  display:inline-flex; align-items:center; gap:8px; cursor:pointer; border:none;
  border-radius:14px; padding:12px 20px; font-size:1rem; font-weight:700;
  font-family:var(--font-display); transition:transform .1s ease, box-shadow .1s ease;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--accent); color:#fff; box-shadow:0 4px 0 var(--accent-dark);}
.btn-primary:active{box-shadow:0 1px 0 var(--accent-dark); transform:translateY(3px);}
.btn-ghost{background:transparent; color:var(--ink); border:2px solid var(--line);}
.btn-success{background:var(--success); color:#fff;}
.btn-small{padding:7px 14px; font-size:0.88rem; border-radius:10px;}
.tag{
  display:inline-block; padding:3px 10px; border-radius:999px; font-size:0.78rem;
  font-weight:700; text-transform:uppercase; letter-spacing:0.4px;
}

/* domain colors */
.domain-passe{background:var(--accent-soft); color:var(--accent-dark);}
.domain-classes{background:#D9E3F2; color:#33507A;}
.domain-expansions{background:var(--success-soft); color:#3E5F44;}
.domain-composes{background:#EAD9F2; color:#6A3E85;}
.domain-complement{background:var(--gold-soft); color:#8A6420;}

/* progress bar */
.bar{height:10px; border-radius:6px; background:var(--bg-alt); overflow:hidden; border:1px solid var(--line);}
.bar > span{display:block; height:100%; background:var(--accent); border-radius:6px; transition:width .4s ease;}

/* ============ THE PATH (signature element) ============ */
.path-wrap{overflow-x:auto; padding:10px 2px 18px;}
.path-svg{display:block; min-width:640px;}
.node{cursor:pointer;}
.node circle{stroke-width:3; transition:transform .15s ease;}
.node:hover circle{transform:scale(1.08); transform-box:fill-box; transform-origin:center;}
.node text{font-family:var(--font-display); font-weight:700; font-size:11px; fill:#fff;}
.node-label{font-family:var(--font-body); font-size:11px; fill:var(--ink-soft);}

/* ============ MISSION / EXERCISE PLAYER ============ */
.mission-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.exercise-counter{font-weight:700; color:var(--ink-soft); font-size:0.9rem;}
.exercise-card{padding:26px;}
.prompt{font-size:1.15rem; margin:6px 0 18px; font-weight:600;}
.choice-list{display:flex; flex-direction:column; gap:10px;}
.choice{
  text-align:left; background:var(--bg-alt); border:2px solid var(--line); border-radius:var(--radius-sm);
  padding:13px 16px; font-size:1rem; cursor:pointer; color:var(--ink); font-family:var(--font-body);
}
.choice:hover{border-color:var(--accent-soft);}
.choice.correct{background:var(--success-soft); border-color:var(--success);}
.choice.incorrect{background:var(--error-bg); border-color:var(--error-soft);}
.choice[disabled]{cursor:default;}

.word-bank, .built-sentence{display:flex; flex-wrap:wrap; gap:8px; min-height:48px; padding:10px; border-radius:var(--radius-sm);}
.built-sentence{background:var(--bg-alt); border:2px dashed var(--line); margin-bottom:12px;}
.word-chip{
  background:var(--card-bg); border:2px solid var(--line); border-radius:10px; padding:9px 13px;
  cursor:pointer; font-size:1rem; font-family:var(--font-body);
}
.word-chip:hover{border-color:var(--accent);}

.classement-cols{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:8px;}
@media (max-width:560px){.classement-cols{grid-template-columns:1fr;}}
.classement-col{background:var(--bg-alt); border:2px dashed var(--line); border-radius:var(--radius-sm); padding:10px; min-height:70px;}
.classement-col h4{margin:0 0 8px; font-size:0.95rem;}
.classement-pool{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}

.feedback-box{margin-top:16px; padding:16px; border-radius:var(--radius-sm); border:2px solid; animation:fadeIn .2s ease;}
.feedback-box.ok{background:var(--success-soft); border-color:var(--success);}
.feedback-box.ko{background:var(--error-bg); border-color:var(--error-soft);}
.feedback-box h4{margin:0 0 6px;}
.feedback-box .rule{font-style:italic; color:var(--ink-soft); margin:6px 0;}

.hint-row{display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;}
.hint-box{background:var(--gold-soft); border:2px solid var(--gold); border-radius:var(--radius-sm); padding:10px 14px; margin-top:10px; font-size:0.92rem;}

/* song block */
.song-block{display:flex; gap:14px; align-items:center; background:var(--bg-alt); border-radius:var(--radius-sm); padding:14px; margin:14px 0; flex-wrap:wrap;}
.song-disc{width:46px; height:46px; border-radius:50%; flex-shrink:0; background:radial-gradient(circle at 35% 35%, var(--gold-soft), var(--ink) 75%);}
.song-info{flex:1; min-width:180px;}

/* mind map */
.mindmap{background:var(--bg-alt); border-radius:var(--radius); padding:18px; border:1px solid var(--line);}
.mm-branch{display:inline-block; background:var(--card-bg); border:2px solid var(--line); border-radius:12px; padding:8px 14px; margin:5px; font-weight:600;}

/* dashboard grid */
.dash-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:18px;}
.stat-card{background:var(--card-bg); border-radius:var(--radius-sm); padding:14px; border:1px solid var(--line); text-align:center;}
.stat-card .num{font-family:var(--font-display); font-size:1.7rem; color:var(--accent-dark); display:block;}

/* toasts / badges */
#toast-layer{position:fixed; top:16px; right:16px; z-index:100; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--ink); color:#fff; padding:12px 18px; border-radius:12px; box-shadow:var(--shadow-lift); font-weight:600; animation:fadeIn .2s ease;}

/* modal */
.modal-overlay{position:fixed; inset:0; background:rgba(43,46,74,0.45); display:none; align-items:center; justify-content:center; z-index:200; padding:16px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--card-bg); border-radius:var(--radius); padding:24px; max-width:480px; width:100%; max-height:85vh; overflow-y:auto;}
.modal h3{margin-top:0;}
label.form-label{display:block; font-weight:700; margin:12px 0 5px; font-size:0.9rem;}
select, input[type=text], textarea{
  width:100%; padding:9px 11px; border-radius:8px; border:2px solid var(--line); font-family:var(--font-body); font-size:0.95rem;
}
.modal-actions{display:flex; gap:10px; margin-top:18px; justify-content:flex-end;}

/* footer link row inside player */
.player-actions{display:flex; justify-content:space-between; margin-top:18px; flex-wrap:wrap; gap:10px;}

/* accessibility: pause / no-timer note */
.no-timer-note{font-size:0.82rem; color:var(--ink-faint); text-align:center; margin-top:6px;}

table.compare-table{width:100%; border-collapse:collapse; margin:10px 0;}
table.compare-table th, table.compare-table td{border:1px solid var(--line); padding:8px 10px; text-align:left; font-size:0.92rem;}
table.compare-table th{background:var(--bg-alt);}
</style>
</head>
<body>

<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="disc" aria-hidden="true"></div>
      <h1>Le Sentier des Mots</h1>
    </div>
    <div class="topbar-stats">
      <span class="pill">✨ <span id="xp-count">0</span> XP</span>
      <span class="pill">🔥 <span id="streak-count">0</span></span>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Navigation principale">
    <button role="tab" data-screen="home" aria-selected="true">Aujourd'hui</button>
    <button role="tab" data-screen="dashboard" aria-selected="false">Tableau de bord</button>
    <button role="tab" data-screen="errors" aria-selected="false">Revoir mes erreurs</button>
    <button role="tab" data-screen="mindmaps" aria-selected="false">Fiches &amp; cartes</button>
    <button role="tab" data-screen="parent" aria-selected="false">Mode parent</button>
  </nav>

  <main id="screens">
    <section id="screen-home" class="screen active" aria-label="Accueil"></section>
    <section id="screen-dashboard" class="screen" aria-label="Tableau de bord"></section>
    <section id="screen-errors" class="screen" aria-label="Revoir mes erreurs"></section>
    <section id="screen-mindmaps" class="screen" aria-label="Fiches et cartes mentales"></section>
    <section id="screen-parent" class="screen" aria-label="Mode parent"></section>
    <section id="screen-mission" class="screen" aria-label="Mission en cours"></section>
    <section id="screen-notion" class="screen" aria-label="Détail de la notion"></section>
  </main>
</div>

<div id="toast-layer" aria-live="polite"></div>

<div class="modal-overlay" id="report-modal">
  <div class="modal" role="dialog" aria-labelledby="report-title">
    <h3 id="report-title">Signaler cette question</h3>
    <p class="small muted">Merci d'aider à améliorer le site. Ce signalement est enregistré localement.</p>
    <label class="form-label" for="report-reason">Motif</label>
    <select id="report-reason">
      <option value="ambigue">Question ambiguë</option>
      <option value="incorrecte">Réponse incorrecte</option>
      <option value="trop_facile">Trop facile</option>
      <option value="trop_difficile">Trop difficile</option>
      <option value="formulation">Formulation étrange</option>
      <option value="correction">Correction insuffisante</option>
      <option value="chanson">Problème de chanson ou de lien</option>
      <option value="technique">Problème technique</option>
    </select>
    <label class="form-label" for="report-comment">Un commentaire (facultatif)</label>
    <textarea id="report-comment" rows="3"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-small" id="report-cancel">Annuler</button>
      <button class="btn btn-primary btn-small" id="report-send">Envoyer le signalement</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="parent-gate">
  <div class="modal" role="dialog" aria-labelledby="gate-title">
    <h3 id="gate-title">Mode parent</h3>
    <p class="small muted">Réponds à ce petit calcul pour confirmer que tu es un adulte (ce n'est pas un mot de passe secret, juste un filtre simple).</p>
    <p id="gate-question" style="font-size:1.2rem; font-weight:700;"></p>
    <input type="text" id="gate-answer" inputmode="numeric">
    <div class="modal-actions">
      <button class="btn btn-ghost btn-small" id="gate-cancel">Annuler</button>
      <button class="btn btn-primary btn-small" id="gate-confirm">Valider</button>
    </div>
  </div>
</div>

<script>
/* ==========================================================================
   LE SENTIER DES MOTS — moteur du parcours de français
   Domaines couverts en priorité : valeurs des temps du passé, classes
   grammaticales, expansions du nom, temps simples et composés.
   Voir LISEZ_MOI.txt pour la liste complète des notions et le rapport
   de contrôle qualité.
   ========================================================================== */

const APP_VERSION = "1.0.0";
const STORAGE_KEY = "sentier_des_mots_v1";

/* Placeholder — rempli dans la partie DATA ci-dessous */
/* ==========================================================================
   DONNÉES PÉDAGOGIQUES
   Répartition demandée : 30% valeurs du passé / 25% classes grammaticales /
   20% expansions du nom / 20% temps simples-composés / 5% complémentaire.
   15 notions couvertes ici (voir LISEZ_MOI.txt pour la liste des notions
   encore en attente d'extension, conformément à la transparence demandée).
   ========================================================================== */

function songLink(artist, title){
  const q = encodeURIComponent(artist + " " + title + " clip officiel");
  return "https://www.youtube.com/results?search_query=" + q;
}

DOMAINS = [
  {
    id: "passe",
    name: "Les valeurs des temps du passé",
    weight: 30,
    tagClass: "domain-passe",
    color: "#E8734A",
    notions: [

      {
        id: "imparfait_valeurs",
        domain: "passe",
        name: "Les valeurs de l'imparfait",
        level4goal: "Justifier pourquoi un texte utilise l'imparfait plutôt qu'un autre temps.",
        prerequisites: "Savoir conjuguer l'imparfait de l'indicatif.",
        objective: "Reconnaître et utiliser l'imparfait pour décrire, exprimer une habitude ou installer un arrière-plan.",
        lesson: "L'imparfait sert surtout à décrire, à raconter une habitude, ou à installer le décor d'une histoire (l'arrière-plan) pendant qu'une autre action se déroule.",
        rule: "On emploie l'imparfait pour une description, une habitude, une répétition ou une action longue sans limite précise dans le temps.",
        example: "La salle était sombre et les lumières brillaient doucement. (description, arrière-plan)",
        commonErrors: "Confondre l'imparfait avec le passé simple quand l'action est en réalité ponctuelle et unique.",
        tip: "Astuce : si tu peux dire « à cette époque » ou « d'habitude » devant la phrase, c'est souvent de l'imparfait.",
        song: { title: "Formidable", artist: "Stromae" , observation: "Repère dans le clip les moments où l'ambiance semble installée depuis longtemps (un décor, une habitude).", mission: "Écris une phrase à l'imparfait qui décrit une scène de rue, comme dans le clip." },
        levels: [
          { level:1, focus:"Reconnaître", exercises:[
            { type:"qcm", question:"Dans quelle phrase le verbe est-il à l'imparfait ?", choices:[
              {text:"Elle chantait tous les soirs.", correct:true},
              {text:"Elle chanta ce soir-là.", correct:false, errorType:"temps_mal_identifie"},
              {text:"Elle a chanté hier.", correct:false, errorType:"temps_mal_identifie"},
              {text:"Elle chantera demain.", correct:false, errorType:"temps_mal_identifie"}
            ]},
            { type:"vrai_faux", statement:"Dans « Il pleuvait sans arrêt ce jour-là », le verbe est à l'imparfait.", correct:true,
              explanationTrue:"Oui : « pleuvait » se termine par -ait, terminaison typique de l'imparfait.",
              explanationFalse:"" }
          ]},
          { level:2, focus:"Comprendre et classer", exercises:[
            { type:"qcm", question:"Que fait l'imparfait dans « La forêt était calme et les oiseaux chantaient » ?", choices:[
              {text:"Il décrit un décor, un arrière-plan.", correct:true},
              {text:"Il raconte une action soudaine.", correct:false, errorType:"confusion_valeur_temps"},
              {text:"Il annonce un futur.", correct:false, errorType:"confusion_valeur_temps"},
              {text:"Il donne un ordre.", correct:false, errorType:"confusion_valeur_temps"}
            ]},
            { type:"classement", instruction:"Classe chaque phrase selon la valeur de l'imparfait.", 
              categories:["Description", "Habitude"],
              items:[
                {text:"Le ciel était gris et lourd.", category:"Description"},
                {text:"Chaque matin, il buvait un café avant de partir.", category:"Habitude"},
                {text:"Elle portait une robe bleue ce jour-là.", category:"Description"},
                {text:"Le dimanche, ils se retrouvaient chez leurs grands-parents.", category:"Habitude"}
              ]}
          ]},
          { level:3, focus:"Manipuler et transformer", exercises:[
            { type:"transformation", instruction:"Mets ce verbe à l'imparfait.", base:"Le vent (souffler) fort sur la falaise.", answer:"soufflait", accept:["Le vent soufflait fort sur la falaise."],
              hint1:"Cherche d'abord le sujet : « Le vent ».", hint2:"La terminaison de l'imparfait à la 3e personne du singulier est -ait." },
            { type:"reconstruire", instruction:"Remets les mots dans l'ordre pour former une phrase correcte à l'imparfait.",
              words:["Autrefois,","les","rues","résonnaient","de","musique"], correctOrder:[0,1,2,3,4,5],
              hint1:"Cherche d'abord le groupe sujet.", hint2:"Le verbe conjugué est en 4e position." }
          ]},
          { level:4, focus:"Analyser et justifier", exercises:[
            { type:"qcm", question:"Pourquoi l'auteur choisit-il l'imparfait dans : « Tous les étés, la famille partait à la mer » ?", choices:[
              {text:"Parce que c'est une habitude répétée dans le passé.", correct:true},
              {text:"Parce que l'action est unique et achevée.", correct:false, errorType:"justification_insuffisante"},
              {text:"Parce que l'action se passe au présent.", correct:false, errorType:"justification_insuffisante"},
              {text:"Parce que c'est un ordre.", correct:false, errorType:"justification_insuffisante"}
            ]},
            { type:"transformation", instruction:"Rédige une phrase à l'imparfait qui décrit une habitude de vacances, puis explique en une phrase pourquoi tu as choisi ce temps.",
              base:"(exercice ouvert, une seule proposition suffit)", answer:"", openEnded:true, sampleAnswer:"Chaque été, nous campions près de la rivière. — J'ai utilisé l'imparfait car c'est une habitude répétée, sans limite précise dans le temps." }
          ]}
        ]
      },

      {
        id: "passe_simple_valeurs",
        domain: "passe",

        objective: "Reconnaître le passé simple et comprendre qu'il exprime une action ponctuelle qui fait avancer le récit.",

        song: { title: "Petit Pays", artist: "Gaël Faye", observation: "Repère les moments où le récit avance d'un événement précis à un autre.", mission: "Écris une phrase au passé simple qui raconte une action soudaine, comme un événement marquant du récit." },

          { level:1, focus:"Reconnaître", exercises:[

              {text:"Il ferme la porte.", correct:false, errorType:"temps_mal_identifie"}
            ]},
            { type:"vrai_faux", statement:"Dans « Elle sourit puis partit », les deux verbes sont au passé simple.", correct:true,

/* ==========================================================================
   MOTEUR : état, sauvegarde, progression, répétition espacée
   ========================================================================== */

const ALL_NOTIONS = [];
DOMAINS.forEach(d => d.notions.forEach(n => { n.weight = d.weight; ALL_NOTIONS.push(n); }));
function findNotion(id){ return ALL_NOTIONS.find(n => n.id === id); }
function findDomain(id){ return DOMAINS.find(d => d.id === id); }

function defaultState(){
  return {
    version: APP_VERSION,
    xp: 0,
    badges: [],
    streak: 0,
    lastSessionDate: null,
    notionProgress: {},   // id -> { level, passage, successCount, attemptCount, lastReview, history:[{level, correct}], errorsFragile:{} }
    errorLog: [],         // {notionId, level, question, given, correct, errorType, date, attempts}
    reports: [],
    songsSeen: {},
    mindmapsSeen: {},
    currentMission: null, // {notionId, exerciseIds:[], index, correctCount}
    parentModeUnlocked: false,
    testMode: false
  };
}

let STATE = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    return merged;
  }catch(e){
    console.warn("Sauvegarde illisible, on repart d'un état neuf.", e);
    return defaultState();
  }
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
  }catch(e){
    showToast("⚠️ La sauvegarde a échoué (mémoire pleine ?).");
  }
}

function blankProgress(){
  return { level:1, passage:0, successCount:0, attemptCount:0, lastReview:null, history:[], errorsFragile:{} };
}

// Read-only peek: never creates or mutates state. Use for scoring/dashboards.
function peekNotionProgress(notionId){
  return STATE.notionProgress[notionId] || blankProgress();
}

// Mutating accessor: only call when actually about to record progress.
function getNotionProgress(notionId){
  if(!STATE.notionProgress[notionId]){
    STATE.notionProgress[notionId] = blankProgress();
  }
  return STATE.notionProgress[notionId];
}

function successRate(notionId){
  const p = peekNotionProgress(notionId);
  if(p.attemptCount === 0) return null;
  return Math.round((p.successCount / p.attemptCount) * 100);
}

/* -------- streak / daily session -------- */
function todayStr(){ return new Date().toISOString().slice(0,10); }
function registerSession(){
  const today = todayStr();
  if(STATE.lastSessionDate === today) return;
  if(STATE.lastSessionDate){
    const prev = new Date(STATE.lastSessionDate);
    const diffDays = Math.round((new Date(today) - prev) / 86400000);
    STATE.streak = (diffDays === 1) ? STATE.streak + 1 : 1;
  } else {
    STATE.streak = 1;
  }
  STATE.lastSessionDate = today;
  saveState();
}

/* -------- XP & badges -------- */
const BADGES = [
  { id:"premiers_pas", label:"Premiers pas", desc:"Terminer sa première mission.", check: s => s.xp >= 10 },
  { id:"serie_3", label:"Série de 3", desc:"3 jours de suite sur le site.", check: s => s.streak >= 3 },
  { id:"serie_7", label:"Série de 7", desc:"7 jours de suite sur le site.", check: s => s.streak >= 7 },
  { id:"explorateur", label:"Explorateur des mots", desc:"Avoir commencé 5 notions différentes.", check: s => Object.keys(s.notionProgress).length >= 5 },
  { id:"chasseur_erreurs", label:"Chasseur d'erreurs", desc:"Corriger 10 erreurs revues.", check: s => s.errorLog.filter(e=>e.resolved).length >= 10 },
  { id:"maitre_passe", label:"Maître du passé", desc:"Atteindre le niveau 4 sur une notion de temps du passé.", check: s => Object.entries(s.notionProgress).some(([id,p]) => { const n=findNotion(id); return n && n.domain==="passe" && p.level>=4; }) },
  { id:"cent_xp", label:"100 XP", desc:"Cumuler 100 XP.", check: s => s.xp >= 100 },
];

function checkBadges(){
  const newly = [];
  BADGES.forEach(b => {
    if(!STATE.badges.includes(b.id) && b.check(STATE)){
      STATE.badges.push(b.id);
      newly.push(b);
    }
  });
  if(newly.length){
    saveState();
    newly.forEach(b => showToast("🏅 Nouveau badge : " + b.label));
  }
}

function addXP(amount){
  STATE.xp += amount;
  saveState();
  checkBadges();
  updateTopbar();
}

/* -------- error logging -------- */
function logError(notionId, level, question, given, correctAnswer, errorType){
  STATE.errorLog.push({
    id: "e" + Date.now() + Math.floor(Math.random()*1000),
    notionId, level, question, given, correctAnswer, errorType,
    date: new Date().toISOString(), attempts:1, resolved:false
  });
  const p = getNotionProgress(notionId);
  p.errorsFragile[errorType || "autre"] = (p.errorsFragile[errorType || "autre"] || 0) + 1;
  saveState();
}

function markErrorResolved(errorId){
  const e = STATE.errorLog.find(e => e.id === errorId);
  if(e){ e.resolved = true; saveState(); checkBadges(); }
}

/* -------- progression per notion (levels 1-4, passages 1-3) -------- */
function registerAttempt(notionId, level, correct){
  const p = getNotionProgress(notionId);
  p.attemptCount++;
  if(correct) p.successCount++;
  p.history.push({ level, correct, date: new Date().toISOString() });
  p.lastReview = new Date().toISOString();
  saveState();
}

function maybeAdvanceLevel(notionId){
  // A notion advances its OWN level only, independent from other notions (per spec §18).
  const p = getNotionProgress(notionId);
  const recentSameLevel = p.history.filter(h => h.level === p.level).slice(-5);
  if(recentSameLevel.length >= 4){
    const rate = recentSameLevel.filter(h=>h.correct).length / recentSameLevel.length;
    if(rate >= 0.75 && p.level < 4){
      p.level += 1;
      showToast("⭐ Niveau " + p.level + " débloqué pour « " + findNotion(notionId).name + " »");
    } else if(rate < 0.4 && p.level > 1){
      // small step back if really struggling, never below 1
      p.level -= 1;
    }
  }
  saveState();
}

function maybeAdvancePassage(notionId){
  // 3 passages required (Découvrir / Consolider / Réinvestir), tracked per notion.
  const p = getNotionProgress(notionId);
  if(p.passage < 3) p.passage += 1;
  saveState();
}

/* -------- mission selection (spaced repetition aware) -------- */
function priorityScore(notion){
  const p = peekNotionProgress(notion.id);
  let score = notion.weight; // respects the requested 30/25/20/20/5 split
  if(!p.lastReview) score += 15; // never seen -> higher priority to discover
  else{
    const daysSince = (Date.now() - new Date(p.lastReview)) / 86400000;
    score += Math.min(daysSince * 2, 20); // the longer since review, the more it resurfaces
  }
  if(p.passage < 3) score += 5; // still needs its 3 spaced passages
  const rate = successRate(notion.id);
  if(rate !== null && rate < 70) score += 10; // fragile notions resurface more (target zone 70-85%, §18)
  return score;
}

function pickNextNotion(){
  const scored = ALL_NOTIONS.map(n => ({ n, score: priorityScore(n) }));
  scored.sort((a,b) => b.score - a.score);
  // small randomization among top 4 so it doesn't feel robotic
  const top = scored.slice(0, 4);
  return top[Math.floor(Math.random()*top.length)].n;
}

function buildMission(notionId){
  const notion = findNotion(notionId || pickNextNotion().id);
  const p = getNotionProgress(notion.id);
  const levelData = notion.levels.find(l => l.level === p.level) || notion.levels[0];
  // 5 to 8 exercises per mission (§20). We cycle through available exercises, repeating with variation if needed.
  const pool = levelData.exercises;
  const count = Math.max(5, Math.min(8, pool.length + 3));
  const list = [];
  for(let i=0;i<count;i++) list.push(pool[i % pool.length]);
  STATE.currentMission = { notionId: notion.id, level: p.level, exIndexes: list.map((_,i)=>i), index:0, correctCount:0, total:list.length };
  saveState();
  return { notion, levelData, exercises: list };
}

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg){
  const layer = document.getElementById("toast-layer");
  if(!layer) return;
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  layer.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(), 300); }, 3200);
}

function updateTopbar(){
  const xpEl = document.getElementById("xp-count");
  const streakEl = document.getElementById("streak-count");
  if(xpEl) xpEl.textContent = STATE.xp;
  if(streakEl) streakEl.textContent = STATE.streak;
}

function switchScreen(name){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  const target = document.getElementById("screen-" + name);
  if(target) target.classList.add("active");
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.setAttribute("aria-selected", b.dataset.screen === name ? "true" : "false");
  });
  window.scrollTo({top:0, behavior:"smooth"});
}

document.addEventListener("click", (e)=>{
  const tabBtn = e.target.closest("nav.tabs button");
  if(tabBtn){
    const screen = tabBtn.dataset.screen;
    switchScreen(screen);
    if(screen === "home") renderHome();
    if(screen === "dashboard") renderDashboard();
    if(screen === "errors") renderErrors();
    if(screen === "mindmaps") renderMindmapsList();
    if(screen === "parent") renderParentEntry();
  }
});

function renderPetiteVictoire(){
  const started = Object.entries(STATE.notionProgress);
  if(started.length === 0) return "Ta première mission t'attend : chaque petit pas compte 🌱";
  const best = started.sort((a,b)=> b[1].successCount - a[1].successCount)[0];
  const n = findNotion(best[0]);
  if(!n || best[1].successCount === 0) return "Ta première mission t'attend : chaque petit pas compte 🌱";
  return `Sur « ${esc(n.name)} », tu as déjà ${best[1].successCount} bonne(s) réponse(s). Bravo pour ta régularité !`;
}

  registerSession();

  currentMissionData.exIndex = 0;
  currentMissionData.correct = 0;
  currentMissionData.hintsUsed = 0;
  switchScreen("mission");

}

function renderSongBlock(notion){
  const s = notion.song;
  if(!s) return "";
  const link = songLink(s.artist, s.title);
  return `
    <div class="song-block">
      <div class="song-disc" aria-hidden="true"></div>
      <div class="song-info">

function renderCurrentExercise(){
  const md = currentMissionData;
  if(md.exIndex >= md.exercises.length){ return renderMissionEnd(); }
  const ex = md.exercises[md.exIndex];
  const el = document.getElementById("screen-mission");
  const header = `
    <div class="mission-header">
      <span class="exercise-counter">Exercice ${md.exIndex+1} / ${md.exercises.length}</span>
      <button class="btn btn-ghost btn-small" id="report-btn">🚩 Signaler</button>
    </div>
  `;
  let body = "";
  if(ex.type === "qcm") body = renderQCM(ex);
  else if(ex.type === "vrai_faux") body = renderVraiFaux(ex);
  else if(ex.type === "classement") body = renderClassement(ex);
  else if(ex.type === "intrus") body = renderIntrus(ex);
  else if(ex.type === "transformation") body = renderTransformation(ex);
  else if(ex.type === "reconstruire") body = renderReconstruire(ex);
  else body = "<p>Type d'exercice inconnu.</p>";

  el.innerHTML = header + `<div class="card exercise-card" id="ex-card">${body}</div><p class="no-timer-note">Aucun chrono. Prends ton temps 🌿</p>`;
  document.getElementById("report-btn").onclick = () => openReportModal(ex);
  wireExerciseHandlers(ex);
}

/* ---- QCM ---- */
function renderQCM(ex){
  return `
    <p class="prompt">${esc(ex.question)}</p>
    <div class="choice-list" id="choice-list">
      ${ex.choices.map((c,i) => `<button class="choice" data-i="${i}">${esc(c.text)}</button>`).join("")}
    </div>
    <div id="feedback-area"></div>
  `;
}
function wireQCM(ex){
  const buttons = document.querySelectorAll("#choice-list .choice");
  buttons.forEach(btn => btn.onclick = () => {
    buttons.forEach(b=>b.disabled=true);
    const i = parseInt(btn.dataset.i,10);
    const choice = ex.choices[i];
    btn.classList.add(choice.correct ? "correct" : "incorrect");
    if(!choice.correct){
      const correctBtn = [...buttons].find((b,j)=>ex.choices[j].correct);
      if(correctBtn) correctBtn.classList.add("correct");
    }
    finishExercise(ex, choice.correct, choice.correct ? null : choice.errorType, btn.textContent, ex.choices.find(c=>c.correct).text);
  });
}

/* ---- vrai / faux ---- */
function renderVraiFaux(ex){
  return `
    <p class="prompt">${esc(ex.statement)}</p>
    <div class="choice-list" id="choice-list">
      <button class="choice" data-v="true">Vrai</button>
      <button class="choice" data-v="false">Faux</button>
    </div>
    <div id="feedback-area"></div>
  `;
}
function wireVraiFaux(ex){
  const buttons = document.querySelectorAll("#choice-list .choice");
  buttons.forEach(btn => btn.onclick = () => {
    buttons.forEach(b=>b.disabled=true);
    const given = btn.dataset.v === "true";
    const ok = given === ex.correct;
    btn.classList.add(ok ? "correct" : "incorrect");
    if(!ok){
      const correctBtn = [...buttons].find(b => (b.dataset.v === "true") === ex.correct);
      if(correctBtn) correctBtn.classList.add("correct");
    }
    finishExercise(ex, ok, ok ? null : "justification_insuffisante", given ? "Vrai":"Faux", ex.correct ? "Vrai":"Faux");
  });
}

/* ---- classement (drag simulated by click-to-place) ---- */
function renderClassement(ex){
  return `
    <p class="prompt">${esc(ex.instruction)}</p>
    <div class="classement-pool" id="classement-pool">
      ${ex.items.map((it,i)=>`<button class="word-chip" data-i="${i}">${esc(it.text)}</button>`).join("")}
    </div>
    <div class="classement-cols" id="classement-cols">
      ${ex.categories.map(cat=>`<div class="classement-col" data-cat="${esc(cat)}"><h4>${esc(cat)}</h4><div class="dropped"></div></div>`).join("")}
    </div>
    <button class="btn btn-primary btn-small" id="check-classement-btn" disabled>Vérifier</button>
    <div id="feedback-area"></div>
  `;
}
let classementState = {};
function wireClassement(ex){
  classementState = { placements: {} }; // itemIndex -> category
  const pool = document.getElementById("classement-pool");
  const cols = document.querySelectorAll(".classement-col");
  let selectedItem = null;
  pool.querySelectorAll(".word-chip").forEach(chip => {
    chip.onclick = () => {
      pool.querySelectorAll(".word-chip").forEach(c=>c.style.outline="none");
      selectedItem = chip;
      chip.style.outline = "3px solid var(--accent)";
    };
  });
  cols.forEach(col => {
    col.onclick = () => {
      if(!selectedItem) { showToast("Choisis d'abord un mot, puis clique sur une colonne."); return; }
      const i = parseInt(selectedItem.dataset.i,10);
      classementState.placements[i] = col.dataset.cat;
      col.querySelector(".dropped").appendChild(selectedItem);
      selectedItem.style.outline="none";
      selectedItem.disabled = false;
      selectedItem = null;
      const done = Object.keys(classementState.placements).length === ex.items.length;
      document.getElementById("check-classement-btn").disabled = !done;
    };
  });
  document.getElementById("check-classement-btn").onclick = () => {
    let allCorrect = true;
    let firstErrorType = null;
    ex.items.forEach((it,i) => {
      const given = classementState.placements[i];
      const ok = given === it.category;
      if(!ok){ allCorrect = false; firstErrorType = "classement_" + it.category; }
    });
    finishExercise(ex, allCorrect, allCorrect ? null : "confusion_classement", "classement proposé", "voir la correction ci-dessous");
  };
}

/* ---- intrus ---- */
function renderIntrus(ex){
  return `
    <p class="prompt">${esc(ex.instruction)}</p>
    <div class="choice-list" id="choice-list">
      ${ex.items.map((t,i)=>`<button class="choice" data-i="${i}">${esc(t)}</button>`).join("")}
    </div>
    <div id="feedback-area"></div>
  `;
}
function wireIntrus(ex){
  const buttons = document.querySelectorAll("#choice-list .choice");
  buttons.forEach(btn => btn.onclick = () => {
    buttons.forEach(b=>b.disabled=true);
    const i = parseInt(btn.dataset.i,10);
    const ok = i === ex.intrusIndex;
    btn.classList.add(ok ? "correct" : "incorrect");
    if(!ok) buttons[ex.intrusIndex].classList.add("correct");
    finishExercise(ex, ok, ok?null:"intrus_mal_identifie", ex.items[i], ex.items[ex.intrusIndex]);
  });
}

/* ---- transformation (text input, with 2 hints + 1 retry) ---- */
function renderTransformation(ex){
  return `
    <p class="prompt">${esc(ex.instruction)}</p>
    ${ex.base && !ex.openEnded ? `<p class="muted"><em>${esc(ex.base)}</em></p>` : ""}
    <input type="text" id="transfo-input" placeholder="Écris ta réponse ici…" autocomplete="off">
    <div class="hint-row">
      <button class="btn btn-ghost btn-small" id="hint1-btn">💡 Indice 1</button>
      <button class="btn btn-ghost btn-small" id="hint2-btn">💡 Indice 2</button>
      <button class="btn btn-primary btn-small" id="check-transfo-btn">Valider</button>
    </div>
    <div id="hint-area"></div>
    <div id="feedback-area"></div>
  `;
}
function wireTransformation(ex){
  let attempts = 0;
  document.getElementById("hint1-btn").onclick = () => {
    document.getElementById("hint-area").innerHTML += `<div class="hint-box">${esc(ex.hint1 || "Relis la mini-leçon ci-dessus.")}</div>`;
  };
  document.getElementById("hint2-btn").onclick = () => {
    document.getElementById("hint-area").innerHTML += `<div class="hint-box">${esc(ex.hint2 || "Vérifie ton accord.")}</div>`;
  };
  document.getElementById("check-transfo-btn").onclick = () => {
    const input = document.getElementById("transfo-input");
    const given = input.value.trim();
    if(ex.openEnded){
      // Open-ended level-4 explanation exercises: always accepted with model shown, no "wrong" state (avoids humiliating penalty per §20)
      document.getElementById("feedback-area").innerHTML = `
        <div class="feedback-box ok">
          <h4>Merci pour ta réponse !</h4>
          <p>Voici un exemple de bonne réponse pour comparer :</p>
          <p><em>${esc(ex.sampleAnswer)}</em></p>
        </div>`;
      document.getElementById("check-transfo-btn").disabled = true;
      input.disabled = true;
      setTimeout(()=>finishExercise(ex, true, null, given, ex.sampleAnswer), 400);
      return;
    }
    const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"").trim();
    const accepted = (ex.accept && ex.accept.length ? ex.accept : [ex.answer]).map(norm);
    const ok = accepted.some(a => norm(given).includes(norm(ex.answer)) || norm(given) === a || a.includes(norm(given)) === false && norm(given)===a);
    const simpleOk = accepted.some(a => a === norm(given)) || norm(given).includes(norm(ex.answer));
    attempts++;
    if(simpleOk){
      input.disabled = true;
      document.getElementById("check-transfo-btn").disabled = true;
      finishExercise(ex, true, null, given, ex.answer);
    } else if(attempts === 1){
      document.getElementById("feedback-area").innerHTML = `<div class="feedback-box ko"><p>Pas tout à fait — essaie encore une fois avant de voir la correction.</p></div>`;
    } else {
      input.disabled = true;
      document.getElementById("check-transfo-btn").disabled = true;
      finishExercise(ex, false, "erreur_terminaison", given, ex.answer);
    }
  };
}

/* ---- reconstruire (click words in order) ---- */
function renderReconstruire(ex){
  return `
    <p class="prompt">${esc(ex.instruction)}</p>
    <div class="built-sentence" id="built-sentence" aria-label="Phrase en construction"></div>
    <div class="word-bank" id="word-bank">
      ${ex.words.map((w,i)=>`<button class="word-chip" data-i="${i}">${esc(w)}</button>`).join("")}
    </div>
    <div class="hint-row">
      <button class="btn btn-ghost btn-small" id="undo-btn">↩ Annuler le dernier mot</button>
      <button class="btn btn-ghost btn-small" id="hint1-btn">💡 Indice 1</button>
      <button class="btn btn-ghost btn-small" id="hint2-btn">💡 Indice 2</button>
      <button class="btn btn-primary btn-small" id="check-reconstruire-btn">Valider</button>
    </div>
    <div id="hint-area"></div>
    <div id="feedback-area"></div>
  `;
}
let reconstruireOrder = [];
function wireReconstruire(ex){
  reconstruireOrder = [];
  const bank = document.getElementById("word-bank");
  const built = document.getElementById("built-sentence");
  function refreshBuilt(){
    built.innerHTML = reconstruireOrder.map(i => `<span class="word-chip">${esc(ex.words[i])}</span>`).join(" ");
  }
  bank.querySelectorAll(".word-chip").forEach(chip => {
    chip.onclick = () => {
      const i = parseInt(chip.dataset.i,10);
      reconstruireOrder.push(i);
      chip.disabled = true;
      chip.style.opacity = "0.35";
      refreshBuilt();
    };
  });
  document.getElementById("undo-btn").onclick = () => {
    const last = reconstruireOrder.pop();
    if(last === undefined) return;
    const chip = bank.querySelector(`.word-chip[data-i="${last}"]`);
    if(chip){ chip.disabled = false; chip.style.opacity = "1"; }
    refreshBuilt();
  };
  document.getElementById("hint1-btn").onclick = () => {
    document.getElementById("hint-area").innerHTML += `<div class="hint-box">${esc(ex.hint1 || "Cherche le groupe sujet en premier.")}</div>`;
  };
  document.getElementById("hint2-btn").onclick = () => {
    document.getElementById("hint-area").innerHTML += `<div class="hint-box">${esc(ex.hint2 || "Repère le verbe conjugué.")}</div>`;
  };
  let attempts = 0;
  document.getElementById("check-reconstruire-btn").onclick = () => {
    const ok = JSON.stringify(reconstruireOrder) === JSON.stringify(ex.correctOrder);
    attempts++;
    if(ok){
      finishExercise(ex, true, null, reconstruireOrder.map(i=>ex.words[i]).join(" "), ex.correctOrder.map(i=>ex.words[i]).join(" "));
    } else if(attempts === 1){
      document.getElementById("feedback-area").innerHTML = `<div class="feedback-box ko"><p>Presque ! Regarde l'ordre des mots et réessaie.</p></div>`;
    } else {
      finishExercise(ex, false, "erreur_construction", reconstruireOrder.map(i=>ex.words[i]).join(" "), ex.correctOrder.map(i=>ex.words[i]).join(" "));
    }
  };
}

function wireExerciseHandlers(ex){
  if(ex.type === "qcm") wireQCM(ex);
  else if(ex.type === "vrai_faux") wireVraiFaux(ex);
  else if(ex.type === "classement") wireClassement(ex);
  else if(ex.type === "intrus") wireIntrus(ex);
  else if(ex.type === "transformation") wireTransformation(ex);
  else if(ex.type === "reconstruire") wireReconstruire(ex);
}

/* ---- shared feedback + progression ---- */
function finishExercise(ex, correct, errorType, given, correctAnswer){
  const md = currentMissionData;
  const notion = md.notion;
  registerAttempt(notion.id, md.level, correct);
  if(correct) md.correct++;
  if(!correct) logError(notion.id, md.level, ex.question || ex.instruction || ex.statement || "", given, correctAnswer, errorType);

  const rule = notion.rule;
  const explanation = buildExplanation(ex, correct, errorType, notion);
  const feedbackArea = document.getElementById("feedback-area");
  if(feedbackArea){
    feedbackArea.innerHTML = `
      <div class="feedback-box ${correct ? "ok":"ko"}">
        <h4>${correct ? "✅ Bonne réponse !" : "🌱 Pas encore, et c'est normal."}</h4>
        <p>${explanation}</p>
        <p class="rule">Règle : ${esc(rule)}</p>
        <p class="small"><strong>Astuce :</strong> ${esc(notion.tip)}</p>
        <button class="btn btn-primary btn-small" id="next-ex-btn" style="margin-top:10px;">Continuer →</button>
      </div>
    `;
    document.getElementById("next-ex-btn").onclick = () => {
      md.exIndex++;
      renderCurrentExercise();
    };
  }
  addXP(correct ? 5 : 2);
}

function buildExplanation(ex, correct, errorType, notion){
  if(correct) return "Bien joué. " + esc(notion.example);
  const map = {
    classe_ou_fonction: "Tu as confondu la classe grammaticale (l'identité du mot) et sa fonction (son rôle dans la phrase).",
    determinant_ou_pronom: "Attention : le déterminant accompagne un nom ; le pronom, lui, le remplace.",
    adjectif_ou_adverbe: "Attention : l'adjectif s'accorde avec le nom ; l'adverbe, lui, ne varie jamais.",
    nom_ou_verbe: "Ce mot ressemble à un verbe, mais ici il est précédé d'un déterminant : c'est donc un nom.",
    relative_ou_conjonctive: "Ici, le mot introduit une proposition relative (il a un antécédent), ce n'est pas une simple conjonction.",
    mauvais_reperage_nom_noyau: "Le nom noyau est le mot indispensable du groupe nominal ; les autres mots ne sont que des expansions.",
    complement_nom_ou_circonstanciel: "Ce groupe complète un nom précis, pas le verbe : c'est un complément du nom.",
    temps_mal_identifie: "Regarde bien la terminaison du verbe pour identifier le bon temps.",
    confusion_temps_simple_compose: "Compte les mots du verbe conjugué : un seul mot = temps simple ; auxiliaire + participe passé = temps composé.",
    auxiliaire_non_repere: "Cherche l'auxiliaire (être ou avoir) juste avant le participe passé.",
    confusion_valeur_temps: "Cette phrase ne correspond pas à cette valeur : relis la mini-leçon pour comparer les usages.",
    imparfait_a_la_place_du_passe_simple: "Ici, l'action est ponctuelle et fait avancer le récit : c'est le passé simple, pas l'imparfait.",
    plus_que_parfait_mal_compris: "Le plus-que-parfait marque une action antérieure à une autre action passée.",
    erreur_terminaison: "Vérifie la terminaison du verbe conjugué.",
    erreur_accord: "Pense à l'accord (genre, nombre) avec le sujet ou avec le nom.",
    erreur_construction: "L'ordre des mots n'est pas encore correct : regarde où se place le verbe conjugué.",
    confusion_classement: "Un ou plusieurs mots ne sont pas dans la bonne catégorie : relis la mini-leçon.",
    intrus_mal_identifie: "Regarde bien ce qui distingue ce mot des trois autres.",
    justification_insuffisante: "La justification proposée ne correspond pas vraiment à la valeur du temps employé ici.",
    autre: "Regarde la correction ci-dessous pour comprendre l'écart."
  };
  const base = map[errorType] || map.autre;
  return base + (correctAnswerHint(ex) || "");
}
function correctAnswerHint(){ return ""; }

function renderMissionEnd(){
  const md = currentMissionData;
  const rate = Math.round((md.correct / md.exercises.length) * 100);
  maybeAdvanceLevel(md.notion.id);
  if(rate >= 70) maybeAdvancePassage(md.notion.id);
  const el = document.getElementById("screen-mission");
  el.innerHTML = `
    <div class="card">
      <h3>Mission terminée 🎉</h3>
      <p>Tu as réussi ${md.correct} / ${md.exercises.length} exercices sur « ${esc(md.notion.name)} ».</p>
      <div class="bar"><span style="width:${rate}%"></span></div>
      <p class="small muted" style="margin-top:14px;">Zone de réussite visée : 70 à 85 %. ${rate < 70 ? "On y retournera bientôt en douceur." : "Bravo, cette notion progresse bien !"}</p>
      <button class="btn btn-primary" id="mission-end-home-btn">Retour à l'accueil</button>
      <button class="btn btn-ghost btn-small" id="mission-end-notion-btn">Voir la fiche de cette notion</button>
    </div>
  `;
  document.getElementById("mission-end-home-btn").onclick = () => { switchScreen("home"); renderHome(); };
  document.getElementById("mission-end-notion-btn").onclick = () => renderNotionDetail(md.notion.id);
}

/* ============================================================
   TABLEAU DE BORD
   ============================================================ */
function renderDashboard(){
  const el = document.getElementById("screen-dashboard");
  const totalAttempts = Object.values(STATE.notionProgress).reduce((s,p)=>s+p.attemptCount,0);
  const totalSuccess = Object.values(STATE.notionProgress).reduce((s,p)=>s+p.successCount,0);
  const globalRate = totalAttempts ? Math.round(totalSuccess/totalAttempts*100) : 0;

  el.innerHTML = `
    <div class="dash-grid">
      <div class="stat-card"><span class="num">${STATE.xp}</span><span class="small muted">XP</span></div>
      <div class="stat-card"><span class="num">${STATE.streak}</span><span class="small muted">jours de suite</span></div>
      <div class="stat-card"><span class="num">${STATE.badges.length}</span><span class="small muted">badges</span></div>
      <div class="stat-card"><span class="num">${globalRate}%</span><span class="small muted">réussite globale</span></div>
    </div>
    <div class="card">
      <h3>Le sentier</h3>
      ${renderPathSVG()}
    </div>
    ${DOMAINS.map(d => `
      <div class="card">
        <span class="tag ${d.tagClass}">${esc(d.name)} · ${d.weight}%</span>
        <div style="margin-top:10px; display:flex; flex-direction:column; gap:10px;">
          ${d.notions.map(n => renderNotionRow(n)).join("")}
        </div>
      </div>
    `).join("")}
  `;
  el.querySelectorAll("[data-open-notion]").forEach(b => b.onclick = () => renderNotionDetail(b.dataset.openNotion));
}

function renderNotionRow(n){
  const p = peekNotionProgress(n.id);
  const rate = successRate(n.id);
  const fragile = Object.keys(p.errorsFragile).length > 0 && (rate !== null && rate < 70);
  return `
    <div style="border:1px solid var(--line); border-radius:10px; padding:10px 12px;">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;">
        <strong>${esc(n.name)}</strong>
        <button class="btn btn-ghost btn-small" data-open-notion="${n.id}">Voir la fiche</button>
      </div>
      <p class="small muted" style="margin:6px 0 0;">
        Niveau ${p.level}/4 · Passage ${p.passage}/3 · ${rate === null ? "pas encore testée" : "réussite " + rate + "%"}
        ${fragile ? ' · <span style="color:var(--error-soft); font-weight:700;">fragile</span>' : ""}
      </p>
      <div class="bar" style="margin-top:6px;"><span style="width:${p.level*25}%"></span></div>
    </div>
  `;
}

function renderPathSVG(){
  let x = 40;
  const y = 60;
  const gap = 90;
  const width = 40 + ALL_NOTIONS.length * gap;
  let nodes = "", lines = "";
  ALL_NOTIONS.forEach((n,i) => {
    const p = peekNotionProgress(n.id);
    const cx = x + i*gap, cy = y + (i%2===0 ? 0 : 26);
    if(i>0){
      const prevX = x + (i-1)*gap, prevY = y + ((i-1)%2===0?0:26);
      lines += `<path d="M${prevX},${prevY} Q${(prevX+cx)/2},${Math.min(prevY,cy)-20} ${cx},${cy}" stroke="var(--path-line)" stroke-width="4" fill="none"/>`;
    }
    const dom = findDomain(n.domain);
    nodes += `<g class="node" data-open-notion="${n.id}" transform="translate(${cx},${cy})">
      <circle r="20" fill="${dom.color}" stroke="#fff"></circle>
      <text text-anchor="middle" dy="5">${p.level}</text>
    </g>`;
  });
  return `<div class="path-wrap"><svg class="path-svg" viewBox="0 0 ${width} 130" role="img" aria-label="Sentier de progression par notion">
    ${lines}${nodes}
  </svg></div>
  <p class="small muted">Chaque pierre du sentier est une notion ; le chiffre indique le niveau atteint (1 à 4). Clique sur une pierre pour ouvrir sa fiche.</p>`;
}

document.addEventListener("click", (e)=>{
  const node = e.target.closest("[data-open-notion]");
  if(node && node.tagName.toLowerCase() !== "button"){
    renderNotionDetail(node.dataset.openNotion);
  }
});

/* ============================================================
   FICHE / CARTE MENTALE D'UNE NOTION
   ============================================================ */
function renderNotionDetail(notionId){
  const n = findNotion(notionId);
  const p = peekNotionProgress(notionId);
  const dom = findDomain(n.domain);
  const rate = successRate(notionId);
  switchScreen("notion");
  const el = document.getElementById("screen-notion");
  el.innerHTML = `
    <div class="card">
      <span class="tag ${dom.tagClass}">${esc(dom.name)}</span>
      <h3>${esc(n.name)}</h3>
      <p class="small muted">Prérequis : ${esc(n.prerequisites)}</p>
      <p><strong>Objectif :</strong> ${esc(n.objective)}</p>
      <p><strong>Mini-leçon :</strong> ${esc(n.lesson)}</p>
      <p class="rule"><strong>Règle :</strong> ${esc(n.rule)}</p>
      <p><strong>Exemple :</strong> ${esc(n.example)}</p>
      <p><strong>Erreur fréquente :</strong> ${esc(n.commonErrors)}</p>
      <p class="small"><strong>Astuce :</strong> ${esc(n.tip)}</p>
      <div class="mindmap">
        <strong>Carte mentale rapide</strong><br>
        <span class="mm-branch">${esc(n.name)}</span> →
        <span class="mm-branch">Règle</span>
        <span class="mm-branch">Exemple</span>
        <span class="mm-branch">Erreur fréquente</span>
        <span class="mm-branch">Astuce</span>
      </div>
      ${renderSongBlock(n)}
      <table class="compare-table">
        <tr><th>Niveau atteint</th><td>${p.level} / 4</td></tr>
        <tr><th>Passages de révision</th><td>${p.passage} / 3</td></tr>
        <tr><th>Taux de réussite</th><td>${rate===null?"—":rate+"%"}</td></tr>
        <tr><th>Dernière révision</th><td>${p.lastReview ? new Date(p.lastReview).toLocaleDateString("fr-FR") : "jamais encore"}</td></tr>
      </table>
      <button class="btn btn-primary" id="detail-start-btn">Faire une mission sur cette notion</button>
      <button class="btn btn-ghost btn-small" id="detail-back-btn">← Retour</button>
    </div>
  `;
  document.getElementById("detail-start-btn").onclick = () => startMission(notionId);
  document.getElementById("detail-back-btn").onclick = () => { switchScreen("dashboard"); renderDashboard(); };
}

function renderMindmapsList(){
  const el = document.getElementById("screen-mindmaps");
  el.innerHTML = `<div class="card"><h3>Fiches &amp; cartes mentales</h3><p class="muted small">Retrouve ici toutes les fiches, classées par domaine.</p></div>` +
    DOMAINS.map(d => `
      <div class="card">
        <span class="tag ${d.tagClass}">${esc(d.name)}</span>
        <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;">
          ${d.notions.map(n=>`<button class="btn btn-ghost btn-small" data-open-notion="${n.id}">${esc(n.name)}</button>`).join("")}
        </div>
      </div>
    `).join("");
  el.querySelectorAll("[data-open-notion]").forEach(b=>b.onclick=()=>renderNotionDetail(b.dataset.openNotion));
}

/* ============================================================
   REVOIR MES ERREURS
   ============================================================ */
function renderErrors(){
  const el = document.getElementById("screen-errors");
  const unresolved = STATE.errorLog.filter(e=>!e.resolved).slice().reverse();
  if(unresolved.length === 0){
    el.innerHTML = `<div class="card"><h3>Revoir mes erreurs</h3><p class="muted">Aucune erreur en attente pour le moment. 🌿</p></div>`;
    return;
  }
  el.innerHTML = `<div class="card"><h3>Revoir mes erreurs</h3><p class="small muted">${unresolved.length} erreur(s) à revoir. Refais un exercice sur la notion concernée pour la corriger.</p></div>` +
    unresolved.map(e => {
      const n = findNotion(e.notionId);
      return `
      <div class="card">
        <span class="tag ${findDomain(n.domain).tagClass}">${esc(n.name)}</span>
        <p style="margin-top:8px;"><strong>Question :</strong> ${esc(e.question)}</p>
        <p class="small">Ta réponse : <em>${esc(e.given||"—")}</em> — Réponse attendue : <em>${esc(e.correctAnswer||"—")}</em></p>
        <p class="small muted">${new Date(e.date).toLocaleDateString("fr-FR")}</p>
        <button class="btn btn-primary btn-small" data-retry-notion="${n.id}" data-error-id="${e.id}">Refaire un exercice sur cette notion</button>
      </div>`;
    }).join("");
  el.querySelectorAll("[data-retry-notion]").forEach(b => b.onclick = () => {
    markErrorResolved(b.dataset.errorId);
    startMission(b.dataset.retryNotion);
  });
}

/* ============================================================
   SIGNALEMENT
   ============================================================ */
let reportedExercise = null;
function openReportModal(ex){
  reportedExercise = ex;
  document.getElementById("report-modal").classList.add("active");
}
document.getElementById("report-cancel").onclick = () => document.getElementById("report-modal").classList.remove("active");
document.getElementById("report-send").onclick = () => {
  const reason = document.getElementById("report-reason").value;
  const comment = document.getElementById("report-comment").value;
  STATE.reports.push({
    id:"r"+Date.now(), notionId: currentMissionData ? currentMissionData.notion.id : null,
    level: currentMissionData ? currentMissionData.level : null,
    question: reportedExercise ? (reportedExercise.question || reportedExercise.instruction || reportedExercise.statement || "") : "",
    reason, comment, date: new Date().toISOString()
  });
  saveState();
  document.getElementById("report-modal").classList.remove("active");
  document.getElementById("report-comment").value = "";
  showToast("Merci, ton signalement a été enregistré 🚩");
};

/* ============================================================
   MODE PARENT
   ============================================================ */
let gateAnswer = null;
function renderParentEntry(){
  const el = document.getElementById("screen-parent");
  if(STATE.parentModeUnlocked){ renderParentPanel(); return; }
  el.innerHTML = `<div class="card"><h3>Mode parent</h3><p class="muted small">Réservé à un adulte : statistiques complètes, déblocage des notions, gestion des signalements.</p>
    <button class="btn btn-primary" id="open-gate-btn">Ouvrir le mode parent</button></div>`;
  document.getElementById("open-gate-btn").onclick = openParentGate;
}
function openParentGate(){
  const a = Math.floor(Math.random()*8)+4, b = Math.floor(Math.random()*8)+3;
  gateAnswer = a*b;
  document.getElementById("gate-question").textContent = `${a} × ${b} = ?`;
  document.getElementById("gate-answer").value = "";
  document.getElementById("parent-gate").classList.add("active");
}
document.getElementById("gate-cancel").onclick = () => document.getElementById("parent-gate").classList.remove("active");
document.getElementById("gate-confirm").onclick = () => {
  const v = parseInt(document.getElementById("gate-answer").value,10);
  if(v === gateAnswer){
    STATE.parentModeUnlocked = true; saveState();
    document.getElementById("parent-gate").classList.remove("active");
    renderParentPanel();
  } else {
    showToast("Ce n'est pas la bonne réponse, réessaie.");
  }
};

function renderParentPanel(){
  const el = document.getElementById("screen-parent");
  const errorTypeCounts = {};
  STATE.errorLog.forEach(e => { errorTypeCounts[e.errorType||"autre"] = (errorTypeCounts[e.errorType||"autre"]||0)+1; });
  el.innerHTML = `
    <div class="card">
      <h3>Mode parent</h3>
      <button class="btn btn-ghost btn-small" id="disable-parent-btn">Désactiver le mode parent</button>
    </div>
    <div class="card">
      <h4>Statistiques globales</h4>
      <p>XP : ${STATE.xp} · Série : ${STATE.streak} jours · Badges : ${STATE.badges.length} · Erreurs enregistrées : ${STATE.errorLog.length} (dont ${STATE.errorLog.filter(e=>e.resolved).length} corrigées)</p>
    </div>
    <div class="card">
      <h4>Erreurs par catégorie</h4>
      ${Object.keys(errorTypeCounts).length===0 ? "<p class='muted small'>Aucune erreur enregistrée pour l'instant.</p>" :
        Object.entries(errorTypeCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<p class="small">${esc(k)} : ${v}</p>`).join("")}
    </div>
    <div class="card">
      <h4>Débloquer une notion / un niveau</h4>
      <label class="form-label" for="unlock-notion-select">Notion</label>
      <select id="unlock-notion-select">${ALL_NOTIONS.map(n=>`<option value="${n.id}">${esc(n.name)}</option>`).join("")}</select>
      <label class="form-label" for="unlock-level-select">Niveau</label>
      <select id="unlock-level-select"><option value="1">1 — Reconnaître</option><option value="2">2 — Comprendre et classer</option><option value="3">3 — Manipuler et transformer</option><option value="4">4 — Analyser et justifier</option></select>
      <button class="btn btn-primary btn-small" id="unlock-btn" style="margin-top:10px;">Appliquer</button>
      <button class="btn btn-ghost btn-small" id="unlock-all-btn" style="margin-top:10px;">Débloquer toutes les notions au niveau 4</button>
    </div>
    <div class="card">
      <h4>Signalements reçus</h4>
      ${STATE.reports.length===0 ? "<p class='muted small'>Aucun signalement.</p>" :
        STATE.reports.slice().reverse().map(r=>`<p class="small">[${esc(r.reason)}] ${esc(r.question)} ${r.comment ? "— " + esc(r.comment) : ""}</p>`).join("")}
    </div>
    <div class="card">
      <h4>Réinitialiser</h4>
      <p class="small muted">Efface toute la progression enregistrée sur cet appareil. Action irréversible.</p>
      <button class="btn btn-ghost btn-small" id="reset-all-btn" style="border-color:var(--error-soft); color:var(--error-soft);">Réinitialiser toutes les données</button>
    </div>
  `;
  document.getElementById("disable-parent-btn").onclick = () => { STATE.parentModeUnlocked = false; saveState(); renderParentEntry(); };
  document.getElementById("unlock-btn").onclick = () => {
    const id = document.getElementById("unlock-notion-select").value;
    const lvl = parseInt(document.getElementById("unlock-level-select").value,10);
    getNotionProgress(id).level = lvl; saveState();
    showToast("Notion mise à jour.");
  };
  document.getElementById("unlock-all-btn").onclick = () => {
    ALL_NOTIONS.forEach(n => getNotionProgress(n.id).level = 4);
    saveState(); showToast("Toutes les notions sont au niveau 4.");
  };
  document.getElementById("reset-all-btn").onclick = () => {
    if(confirm("Es-tu sûr(e) de vouloir tout réinitialiser ? Cette action est irréversible.")){
      localStorage.removeItem(STORAGE_KEY);
      STATE = defaultState();
      saveState();
      showToast("Toutes les données ont été réinitialisées.");
      renderParentPanel();
    }
  };
}

/* ============================================================
   INITIALISATION
   ============================================================ */
function initApp(){
  updateTopbar();
  renderHome();
}
document.addEventListener("DOMContentLoaded", initApp);

</script>
